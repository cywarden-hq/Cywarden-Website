[build]
  command = "npm run build"
  publish = ".next"

# Anti-clickjacking — applied at the CDN for all routes (complements next.config headers).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Content-Security-Policy = "frame-ancestors 'none'"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Let next/image use sharp on Linux; keep native binary out of the esbuild bundle.
[functions]
  external_node_modules = ["sharp"]